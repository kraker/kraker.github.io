---
# hugo.yaml — Hextra

baseURL: https://kraker.github.io/
title: Alex Kraker
author: Alex Kraker
copyright: "Copyright © 2026 Alex Kraker"
languageCode: en-us

enableGitInfo: true
enableInlineShortcodes: true
enableRobotsTXT: true

# Blog-primary site: suppress the docs-style sidebar globally. Applied via
# cascade in content/_index.md so Hextra's blog layout (which manages its own
# sidebar placeholder) isn't second-guessed by a site-level cascade.

module:
  hugoVersion:
    extended: true
    min: "0.146.0"
  imports:
    - path: github.com/imfing/hextra

# Homepage + section output formats (RSS for sections preserves /index.xml and /blog/index.xml)
outputs:
  home: [html, rss, llms]
  page: [html, markdown]
  section: [html, rss, markdown]

pagination:
  pagerSize: 10

markup:
  highlight:
    noClasses: false
  goldmark:
    renderer:
      unsafe: true
    extensions:
      passthrough:
        delimiters:
          block: [['\[', '\]'], ['$$', '$$']]
          inline: [['\(', '\)']]
        enable: true
  tableOfContents:
    startLevel: 2
    endLevel: 3
    ordered: true

menu:
  main:
    - identifier: blog
      name: Blog
      pageRef: /blog
      weight: 1
    - identifier: notes
      name: Notes
      url: https://kraker.github.io/notes/
      weight: 2
      params:
        icon: external-link
    - identifier: projects
      name: Projects
      pageRef: /projects
      weight: 3
    - identifier: about
      name: About
      pageRef: /about
      weight: 4
    - name: Search
      weight: 5
      params:
        type: search
    - name: RSS
      weight: 6
      url: /blog/index.xml
      params:
        icon: rss
    - name: GitHub
      weight: 7
      url: https://github.com/kraker
      params:
        icon: github

params:
  description: >
    Alex Kraker is a Linux security engineer, coffee lover, adoring pet owner,
    musician and autodidact.

  externalLinkDecoration: true

  navbar:
    displayTitle: true
    displayLogo: false
    width: wide

  page:
    width: wide
    displayPagination: false

  blog:
    list:
      displayTags: true
    article:
      displayPagination: true

  theme:
    # Default landing theme is dark per migration plan. Toggle still available.
    default: dark
    displayToggle: true

  footer:
    width: wide
    displayCopyright: true
    displayPoweredBy: false

  displayUpdatedDate: true
  dateFormat: "January 2, 2006"

  search:
    enable: true
    type: flexsearch
    flexsearch:
      index: content
      tokenize: forward

  # Open Graph / Twitter defaults (Hextra reads these via internal head templates)
  images:
    - head-shot-3.jpg

  # Comments — Giscus. Kept disabled until repoId/categoryId are added from giscus.app.
  comments:
    enable: false
    type: giscus
    giscus:
      repo: kraker/kraker.github.io
      repoId: ""
      category: ""
      categoryId: ""

  # Analytics — GoatCounter. Block is omitted until the 'kraker' subdomain is
  # registered at goatcounter.com; Hextra treats an empty `code` as an error.
  # To enable, add:
  #   analytics:
  #     goatCounter:
  #       code: "kraker"

  # Socials surfaced by theme partials / footer
  socials:
    - name: GitHub
      url: https://github.com/kraker
    - name: LinkedIn
      url: https://www.linkedin.com/in/alexkraker/
    - name: Email
      url: mailto:alex@alexkraker.com

# Image processing — preserved from risotto config
imaging:
  quality: 82
  resampleFilter: Lanczos
  exif:
    includeFields: ""
    excludeFields: "GPS.*"
    disableDate: false
    disableLatLong: true
  anchor: Smart

caches:
  images:
    dir: :cacheDir/images
    maxAge: "24h"
