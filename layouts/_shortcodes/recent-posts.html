{{- $limit := (.Get "limit" | default "5") | int -}}
{{- $posts := where site.RegularPages "Section" "blog" -}}
<ul>
{{- range first $limit $posts }}
  <li>
    <a href="{{ .RelPermalink }}">{{ .Title }}</a>
    <span class="hx:opacity-60 hx:text-sm"> — {{ .Date.Format "January 2, 2006" }}</span>
  </li>
{{- end }}
</ul>
