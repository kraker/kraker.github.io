{{- $limit := (.Get "limit" | default "5") | int -}}
{{- $posts := where site.RegularPages "Section" "blog" -}}
<div class="hx:mt-8 hx:max-w-xl hx:mx-auto hx:text-left">
  <h2 class="hx:text-sm hx:font-semibold hx:uppercase hx:tracking-wider hx:opacity-60 hx:mb-3">Latest posts</h2>
  <ul class="hx:space-y-2 hx:list-none hx:ml-0">
    {{- range first $limit $posts }}
    <li>
      <a class="hx:font-medium hx:hover:underline" href="{{ .RelPermalink }}">{{ .Title }}</a>
      <span class="hx:opacity-60 hx:text-sm hx:ml-2">{{ .Date.Format "Jan 2, 2006" }}</span>
    </li>
    {{- end }}
  </ul>
</div>
