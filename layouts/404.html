{{- define "main" -}}
<div class="hx:mx-auto hx:flex hextra-max-page-width">
  {{ partial "sidebar.html" (dict "context" . "disableSidebar" true "displayPlaceholder" false) }}
  <article class="hx:w-full hx:break-words hx:flex hx:min-h-[calc(100vh-var(--navbar-height))] hx:min-w-0 hx:justify-center hx:pb-8">
    <main id="content" class="hx:w-full hx:min-w-0 hextra-max-content-width hx:px-6 hx:pt-16 hx:md:px-12">
      <h1 class="hx:text-center hx:text-6xl hx:font-extrabold hx:tracking-tight hx:mb-4 hx:bg-clip-text hx:text-transparent hx:bg-gradient-to-r hx:from-gray-900 hx:to-gray-600 hx:dark:from-gray-100 hx:dark:to-gray-400">
        404
      </h1>
      <p class="hx:text-center hx:text-xl hx:text-gray-600 hx:dark:text-gray-400 hx:mb-12">
        The page you're looking for doesn't exist.
      </p>
      <div class="hx:max-w-md hx:mx-auto hx:text-center">
        <ul class="hx:space-y-2 hx:text-left hx:inline-block">
          <li><a class="hx:text-primary-600 hx:hover:underline" href="/">Home</a></li>
          <li><a class="hx:text-primary-600 hx:hover:underline" href="/blog/">Blog</a></li>
          <li><a class="hx:text-primary-600 hx:hover:underline" href="/about/">About</a></li>
        </ul>
        <p class="hx:mt-8 hx:text-sm hx:text-gray-500 hx:dark:text-gray-500">
          Landed here from an external link?
          <a class="hx:text-primary-600 hx:hover:underline" href="https://github.com/kraker/kraker.github.io/issues">Open an issue</a>
          and I'll add a redirect.
        </p>
      </div>
    </main>
  </article>
  <div class="hx:max-xl:hidden hx:h-0 hx:w-64 hx:shrink-0"></div>
</div>
{{- end -}}
